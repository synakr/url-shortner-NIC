spring.application.name=url-shortener
server.port=8080

spring.datasource.url=${DB_URI}
spring.datasource.username=${DB_UN}
spring.datasource.password=${DB_PASS}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true

spring.data.redis.url=${REDIS_URI}
spring.cache.type=redis

app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5174

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXP}

security.jwt.refresh-token-expiration-days=${REFTOK_EXP}

ipinfo.token=${IPINFO_TOKEN}

app.rate-limit.shorten-url=5
app.rate-limit.login=10
app.rate-limit.register=3
app.rate-limit.forgot-password=3
app.rate-limit.reset-password=3
app.rate-limit.refresh=20
app.rate-limit.update-username=5
app.rate-limit.change-password=3
app.rate-limit.deactivate-account=2
app.rate-limit.activate-url=10
app.rate-limit.deactivate-url=10
app.rate-limit.change-email=3
app.rate-limit.update-url=20

app.url.default-expiry-days=7
app.url.max-expiry-days=10
app.url.grace-period-days=3
app.url.default-extend-days=5
app.redirect.abuse-threshold=1000
app.redirect.block-duration=10
app.url.max-active-urls=20

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.audit.enabled=true